<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoboGraph Studio v1</title>
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        :root {
            --bg-color: #1e1e1e;
            --panel-bg: #252526;
            --text-color: #cccccc;
            --accent: #007acc;
            --border: #3c3c3c;
        }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; padding: 0; 
            background: var(--bg-color); color: var(--text-color);
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }
        
        /* Top Navigation Toolbar */
        nav {
            background: #333333; padding: 10px; display: flex; align-items: center; border-bottom: 1px solid var(--border);
        }
        nav h1 { font-size: 16px; margin: 0 20px 0 0; color: #fff; }
        .view-btn {
            background: transparent; color: #ccc; border: 1px solid transparent; padding: 5px 10px; margin-right: 5px; cursor: pointer; border-radius: 3px; font-size: 13px;
        }
        .view-btn:hover { background: #444; }
        .view-btn.active { background: #555; border: 1px solid #777; color: #fff; }
        
        /* Main Layout */
        #container { display: flex; flex: 1; position: relative; }
        
        /* Sidebar */
        #sidebar {
            width: 300px; background: var(--panel-bg); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; padding: 10px; overflow-y: auto;
        }
        #sidebar h2 { font-size: 13px; text-transform: uppercase; margin-bottom: 10px; color: #fff; border-bottom: 1px solid var(--border); padding-bottom: 5px;}
        .section { margin-bottom: 20px; }
        
        input[type="text"] {
            width: 100%; padding: 6px; margin-bottom: 10px; 
            background: #3c3c3c; color: white; border: 1px solid transparent; box-sizing: border-box; border-radius: 3px;
        }
        input[type="text"]:focus { outline: none; border: 1px solid var(--accent); }
        
        .list-item { padding: 6px; font-size: 12px; cursor: pointer; border-radius: 3px; word-break: break-all; }
        .list-item:hover { background: #37373d; color: #fff; }
        
        .badge { display: inline-block; padding: 2px 5px; border-radius: 3px; font-size: 9px; font-weight: bold; margin-right: 5px; color: #fff;}
        .pkg-badge { background: #b2b200; }
        .node-badge { background: #1f5baf; }
        .topic-badge { background: #c45e61; }
        .class-badge { background: #009900; }
        
        /* Network View */
        #network-wrapper { flex: 1; position: relative; background: #1e1e1e; }
        #network { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
        
        /* Right Details Panel */
        #details-panel {
            width: 350px; background: var(--panel-bg); border-left: 1px solid var(--border);
            padding: 15px; overflow-y: auto; display: none; box-sizing: border-box;
        }
        #details-panel h3 { font-size: 15px; margin-top: 0; color: #fff; word-break: break-all;}
        
        .prop-row { font-size: 12px; margin-bottom: 5px; }
        .prop-label { color: #888; font-weight: bold; width: 80px; display: inline-block; }
        
        pre { white-space: pre-wrap; font-family: monospace; font-size: 11px; background: #1e1e1e; padding: 10px; border-radius: 4px; border: 1px solid var(--border); }
        
        .btn-small { background: var(--accent); color: white; border: none; padding: 4px 8px; cursor: pointer; border-radius: 2px; font-size: 11px; margin-top: 5px;}
        .btn-small:hover { background: #005f9e; }
        
        /* Metrics overlay */
        #metrics-panel { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
        .metric-card { background: #333; padding: 5px 10px; border-radius: 3px; font-size: 11px; text-align: center; flex: 1; min-width: 60px; }
        .metric-card span { display: block; font-size: 16px; font-weight: bold; color: #fff; }
    </style>
</head>
<body>

<nav>
    <h1>🤖 RoboGraph Studio</h1>
    <button class="view-btn active" onclick="changeView('all', this)">All</button>
    <button class="view-btn" onclick="changeView('packages', this)">Packages</button>
    <button class="view-btn" onclick="changeView('launch', this)">Launch</button>
    <button class="view-btn" onclick="changeView('nodes', this)">Nodes</button>
    <button class="view-btn" onclick="changeView('topics', this)">Topics</button>
    <button class="view-btn" onclick="changeView('classes', this)">Classes</button>
    <button class="view-btn" onclick="changeView('calls', this)">Calls</button>
    <button class="view-btn" onclick="changeView('subsystems', this)">Subsystems</button>
    <div style="flex:1;"></div>
    <button class="view-btn" onclick="loadGraph()">⟳ Reload</button>
</nav>

<div id="container">
    <div id="sidebar">
        <div class="section">
            <h2>Global Search</h2>
            <input type="text" id="searchInput" placeholder="Search nodes, topics, files..." onkeyup="runSearch(event)">
            <div id="searchResults" style="max-height: 200px; overflow-y: auto;"></div>
        </div>
        
        <div class="section">
            <h2>Start Here</h2>
            <div id="metrics-panel"></div>
            <div id="recommendations-list">Loading...</div>
        </div>
    </div>
    
    <div id="network-wrapper">
        <div id="network"></div>
    </div>
    
    <div id="details-panel">
        <h3 id="node-title">Entity Details</h3>
        <div id="node-badge" class="badge"></div>
        <div class="prop-row"><span class="prop-label">Community:</span><span id="node-community"></span></div>
        <div class="prop-row"><span class="prop-label">File:</span><span id="node-file" style="color: #4dc9f6;"></span></div>
        
        <h2 style="font-size:13px; color:#fff; margin-top:20px; border-bottom:1px solid #3c3c3c;">Impact Analysis</h2>
        <div id="impact-results" style="font-size:12px; margin-bottom: 10px;">Loading impact...</div>
        <button class="btn-small" onclick="loadExecutionFlow()">Load Execution Flow</button>
        
        <h2 style="font-size:13px; color:#fff; margin-top:20px; border-bottom:1px solid #3c3c3c;">AI Explainability</h2>
        <pre id="node-explanation">Loading explanation...</pre>
    </div>
</div>

<script>
    let network = null;
    let nodesDataSet = new vis.DataSet();
    let edgesDataSet = new vis.DataSet();
    let currentView = 'all';
    let selectedNodeId = null;
    
    const TYPE_COLORS = {
        'ros_node': { bg: '#2b7ce9', border: '#1f5baf', shape: 'box', badge: 'node-badge' },
        'topic': { bg: '#fb7e81', border: '#c45e61', shape: 'ellipse', badge: 'topic-badge' },
        'package': { bg: '#ffff00', border: '#b2b200', shape: 'hexagon', badge: 'pkg-badge' },
        'launch_file': { bg: '#97c2fc', border: '#7093c4', shape: 'database', badge: 'node-badge' },
        'class': { bg: '#00cc00', border: '#009900', shape: 'diamond', badge: 'class-badge' },
        'function': { bg: '#ff9900', border: '#cc7a00', shape: 'triangle', badge: 'class-badge' },
        'community': { bg: '#9933cc', border: '#732699', shape: 'circle', badge: 'class-badge' },
        'default': { bg: '#cccccc', border: '#999999', shape: 'dot', badge: '' }
    };

    function changeView(view, btn) {
        document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentView = view;
        loadGraph();
    }

    async function loadMetrics() {
        try {
            const res = await fetch('/api/metrics');
            const data = await res.json();
            const panel = document.getElementById('metrics-panel');
            panel.innerHTML = `
                <div class="metric-card"><span>${data.counts.packages}</span>Pkgs</div>
                <div class="metric-card"><span>${data.counts.nodes}</span>Nodes</div>
                <div class="metric-card"><span>${data.counts.topics}</span>Topics</div>
                <div class="metric-card"><span>${data.counts.launch_files}</span>Launch</div>
            `;
            
            const list = document.getElementById('recommendations-list');
            list.innerHTML = '<strong style="font-size:11px; color:#aaa;">Top Central Entities:</strong>';
            data.top_connected.forEach(cp => {
                const div = document.createElement('div');
                div.className = 'list-item';
                div.innerHTML = `🔥 ${cp.node}`;
                div.onclick = () => focusNode(cp.node);
                list.appendChild(div);
            });
        } catch(e) {}
    }

    async function loadGraph() {
        try {
            const res = await fetch(`/api/graph?view=${currentView}`);
            const data = await res.json();
            
            nodesDataSet.clear();
            edgesDataSet.clear();
            
            const visNodes = data.nodes.map(n => {
                const style = TYPE_COLORS[n.type] || TYPE_COLORS.default;
                return {
                    id: n.id, label: n.label, shape: style.shape,
                    color: { background: style.bg, border: style.border },
                    font: { color: '#ffffff' }, _rawData: n
                };
            });
            
            const visEdges = data.edges.map(e => ({
                from: e.from, to: e.to, label: e.relation, arrows: 'to',
                color: { color: '#666', highlight: '#007acc' },
                font: { color: '#aaa', size: 10, align: 'middle' },
                width: e.confidence > 0.9 ? 2 : 1
            }));
            
            nodesDataSet.add(visNodes);
            edgesDataSet.add(visEdges);
            
            if (!network) {
                const container = document.getElementById('network');
                network = new vis.Network(container, { nodes: nodesDataSet, edges: edgesDataSet }, {
                    physics: { barnesHut: { gravitationalConstant: -20000, centralGravity: 0.3, springLength: 95 } },
                    interaction: { hover: true }, nodes: { borderWidth: 2 }
                });
                
                network.on("selectNode", function (params) {
                    if (params.nodes.length > 0) showNodeDetails(params.nodes[0]);
                });
                network.on("deselectNode", function () {
                    document.getElementById('details-panel').style.display = 'none';
                });
            }
        } catch(e) { console.error(e); }
    }

    async function runSearch(e) {
        const query = e.target.value.trim();
        const resultsDiv = document.getElementById('searchResults');
        
        if (query.length < 2) { resultsDiv.innerHTML = ''; return; }
        
        try {
            const res = await fetch(`/api/search?q=${encodeURIComponent(query)}`);
            const data = await res.json();
            
            resultsDiv.innerHTML = '';
            const allItems = [...data.nodes, ...data.topics, ...data.packages, ...data.classes, ...data.launch_files];
            
            if (allItems.length === 0) {
                resultsDiv.innerHTML = '<div style="font-size:11px; color:#888; padding:5px;">No results found.</div>';
                return;
            }
            
            allItems.slice(0, 50).forEach(item => {
                const div = document.createElement('div');
                div.className = 'list-item';
                const style = TYPE_COLORS[item.type] || TYPE_COLORS.default;
                div.innerHTML = `<span class="badge ${style.badge}" style="background:${style.bg}">${item.type.substring(0,3)}</span> ${item.id}`;
                div.onclick = () => focusNode(item.id);
                resultsDiv.appendChild(div);
            });
        } catch(err) {}
    }

    async function showNodeDetails(nodeId) {
        selectedNodeId = nodeId;
        const panel = document.getElementById('details-panel');
        panel.style.display = 'block';
        
        const node = nodesDataSet.get(nodeId);
        const raw = node ? node._rawData : {};
        
        document.getElementById('node-title').textContent = nodeId;
        document.getElementById('node-community').textContent = raw.community || '-';
        document.getElementById('node-file').textContent = raw.file_path || '-';
        
        const style = TYPE_COLORS[raw.type] || TYPE_COLORS.default;
        const badge = document.getElementById('node-badge');
        badge.textContent = (raw.type || 'unknown').toUpperCase();
        badge.className = `badge ${style.badge}`;
        badge.style.background = style.bg;
        
        // Load Impact
        document.getElementById('impact-results').innerHTML = "Analyzing...";
        fetch(`/api/impact/${encodeURIComponent(nodeId)}`).then(r => r.json()).then(data => {
            let html = `<strong>Risk:</strong> <span style="color:${data.risk === 'HIGH' ? '#ff4444' : '#ffbb33'}">${data.risk}</span><br>`;
            html += `<strong>Inbound Dependencies:</strong> ${data.inbound.length}<br>`;
            html += `<strong>Outbound Effects:</strong> ${data.outbound.length}<br>`;
            document.getElementById('impact-results').innerHTML = html;
        });
        
        // Load Explainability
        document.getElementById('node-explanation').textContent = "Analyzing...";
        fetch(`/api/explain/${encodeURIComponent(nodeId)}`).then(r => r.json()).then(data => {
            document.getElementById('node-explanation').textContent = data.explanation;
        });
    }

    async function loadExecutionFlow() {
        if (!selectedNodeId) return;
        try {
            const res = await fetch(`/api/flow/${encodeURIComponent(selectedNodeId)}`);
            const data = await res.json();
            
            const pathIds = data.nodes.map(n => n.id);
            network.selectNodes(pathIds);
            network.fit({ nodes: pathIds, animation: true });
        } catch(e) {}
    }

    function focusNode(nodeId) {
        if (!nodesDataSet.get(nodeId)) {
            // Node might not be in current view, switch to 'all'
            changeView('all', document.querySelector('.view-btn'));
            setTimeout(() => {
                network.selectNodes([nodeId]);
                network.focus(nodeId, { scale: 1.5, animation: true });
                showNodeDetails(nodeId);
            }, 500);
            return;
        }
        network.selectNodes([nodeId]);
        network.focus(nodeId, { scale: 1.5, animation: true });
        showNodeDetails(nodeId);
    }

    window.onload = () => {
        loadGraph();
        loadMetrics();
    };
</script>

</body>
</html>
